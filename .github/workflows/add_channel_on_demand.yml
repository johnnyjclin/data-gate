name: Add Channel On Demand

on:
  workflow_dispatch:
    inputs:
      slug:
        description: '頻道 slug（英數小寫，e.g. xrex）'
        required: true
        type: string
      name:
        description: '頻道顯示名稱'
        required: true
        type: string
      channel_id:
        description: 'YouTube Channel ID（UCxxxx）'
        required: true
        type: string
      description:
        description: '頻道描述（選填）'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  add-channel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser python-dotenv

      - name: Add channel
        env:
          INPUT_SLUG: ${{ inputs.slug }}
          INPUT_NAME: ${{ inputs.name }}
          INPUT_CHANNEL_ID: ${{ inputs.channel_id }}
          INPUT_DESC: ${{ inputs.description }}
        run: |
          python pipeline/add_channel.py \
            --slug "$INPUT_SLUG" \
            --name "$INPUT_NAME" \
            --youtube-channel-id "$INPUT_CHANNEL_ID" \
            --description "$INPUT_DESC"

      - name: Commit channel registration
        run: |
          git config user.name "DataGate Bot"
          git config user.email "bot@datagate.xyz"
          git add docs/ data/
          git diff --staged --quiet || git commit -m "add channel: ${{ inputs.slug }}"
          git push

      - name: Deploy site
        run: |
          pip install mkdocs-material
          mkdocs gh-deploy --force
