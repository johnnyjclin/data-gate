name: RSS Poller — 自動抓取新影片

on:
  schedule:
    # 每 6 小時執行一次（UTC 時間）
    - cron: '0 */6 * * *'
  workflow_dispatch:  # 允許手動觸發

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (yt-dlp)
        run: |
          pip install --upgrade yt-dlp feedparser openai python-dotenv

      - name: Run RSS poller
        env:
          GITHUB_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          LLM_MODEL: gpt-4o-mini
        run: python pipeline/rss_poller.py

      - name: Commit and push new articles
        run: |
          git config user.name "DataGate Bot"
          git config user.email "bot@datagate.xyz"
          git add docs/ data/
          # 只在有變更時才 commit
          git diff --staged --quiet || git commit -m "auto: RSS poller $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Deploy MkDocs
        if: success()
        run: |
          pip install mkdocs-material
          mkdocs gh-deploy --force
