name: Ingest Video On Demand

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube 影片 URL'
        required: true
        type: string
      channel:
        description: '頻道 slug（選填，自動偵測）'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yt-dlp openai python-dotenv

      - name: Run ingest pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          LLM_MODEL: gpt-4o-mini
          INPUT_URL: ${{ inputs.url }}
          INPUT_CHANNEL: ${{ inputs.channel }}
        run: |
          if [ -n "$INPUT_CHANNEL" ]; then
            python pipeline/ingest.py --url "$INPUT_URL" --channel "$INPUT_CHANNEL"
          else
            python pipeline/ingest.py --url "$INPUT_URL"
          fi

      - name: Commit new article
        run: |
          git config user.name "DataGate Bot"
          git config user.email "bot@datagate.xyz"
          git add docs/ data/
          git diff --staged --quiet || git commit -m "add: video via on-demand ingest"
          git push

      - name: Deploy site
        run: |
          pip install mkdocs-material
          mkdocs gh-deploy --force
